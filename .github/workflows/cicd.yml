name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t goal-manager .

      - name: Run Docker container
        run: docker run -d --name goal-manager-ci -p 3000:3000 goal-manager

      - name: Verify /health endpoint
        run: |
          response=$(curl --fail --retry 10 --retry-delay 2 --retry-connrefused http://127.0.0.1:3000/health)
          echo "$response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Stop Docker container
        if: always()
        run: docker rm -f goal-manager-ci || true
